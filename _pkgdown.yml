url: https://ghsamuel.github.io/easyGSEA/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2C3E50"
    secondary: "#34495E"
    success: "#27AE60"
    danger: "#E74C3C"
    base_font:
      google: "Source Sans Pro"
    heading_font:
      google: "Montserrat"
    code_font:
      google: "Source Code Pro"
    font_scale: 1.05

home:
  title: easyGSEA • Simplified Gene Set Enrichment Analysis
  description: >
    One-line GSEA from DESeq2 results. Auto-detects organisms,
    uses correct p-values, generates publication-ready plots.
  sidebar:
    structure: [links, license, citation, authors, dev]

navbar:
  bg: primary
  structure:
    left:  [intro, reference, articles]
    right: [search, github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Tutorials
      menu:
      - text: Getting Started
        href: articles/quickstart.html
      - text: Custom Pathways
        href: articles/custom-pathways.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/ghsamuel/easyGSEA
      aria-label: View source on GitHub

reference:
- title: Core Functions
  desc: Main workflow functions
  contents:
  - gsea_from_deseq
  - compare_gsea

- title: Visualization
  desc: Plotting and output
  contents:
  - plot_gsea
  - plot_comparison
  - plot_all

- title: Utilities
  desc: Helper functions
  contents:
  - starts_with("run_gsea")
  - detect_organism
  - get_orgdb
  - rank_genes

footer:
  structure:
    left: developed_by
    right: built_with
